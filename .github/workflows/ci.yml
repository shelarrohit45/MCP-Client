name: CI

# Runs on every branch push and on pull requests (not limited to main).
on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          chmod -R u+w venv 2>/dev/null || true
          rm -rf venv .ci-venv
          python -m venv .ci-venv
          .ci-venv/bin/python -m pip install --upgrade pip
          .ci-venv/bin/pip install -r requirements.txt
          ln -sfn .ci-venv venv

      - name: Prepare config
        run: |
          if [ ! -f config/config.yaml ]; then
            cp config/config.example.yaml config/config.yaml
          fi
          mkdir -p logs

      - name: Create minimal .env for config loader
        run: |
          cp .env.example .env
          printf '%s\n' \
            "GITHUB_PERSONAL_ACCESS_TOKEN=ci-placeholder-token" \
            "EMAIL_PASSWORD=ci-placeholder-password" \
            "ACTION_SECRET=ci-placeholder-action-secret-for-tests" \
            >> .env

      - name: Run unit tests
        run: |
          ./venv/bin/python scripts/test_step01.py
          ./venv/bin/python scripts/test_step02.py
          ./venv/bin/python scripts/test_step10.py
          ./venv/bin/python scripts/test_step11.py

  integration-tests:
    name: Integration tests (GitHub + Email MCP)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Skip fork PRs — secrets are not available to untrusted forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check integration prerequisites
        id: integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Integration tests skipped: GITHUB_PERSONAL_ACCESS_TOKEN secret not set."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.integration.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        if: steps.integration.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        if: steps.integration.outputs.enabled == 'true'
        run: |
          chmod -R u+w venv 2>/dev/null || true
          rm -rf venv .ci-venv
          python -m venv .ci-venv
          .ci-venv/bin/python -m pip install --upgrade pip
          .ci-venv/bin/pip install -r requirements.txt
          ln -sfn .ci-venv venv

      - name: Install MCP servers
        if: steps.integration.outputs.enabled == 'true'
        run: |
          chmod +x scripts/install_github_mcp.sh scripts/install_email_mcp.sh
          ./scripts/install_github_mcp.sh
          ./scripts/install_email_mcp.sh

      - name: Prepare config
        if: steps.integration.outputs.enabled == 'true'
        run: |
          if [ ! -f config/config.yaml ]; then
            cp config/config.example.yaml config/config.yaml
          fi
          mkdir -p logs

      - name: Create .env from secrets
        if: steps.integration.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          cp .env.example .env
          printf '%s\n' \
            "GITHUB_PERSONAL_ACCESS_TOKEN=$GITHUB_TOKEN" \
            "EMAIL_PASSWORD=${EMAIL_PASS:-ci-placeholder-password}" \
            "ACTION_SECRET=ci-placeholder-action-secret-for-tests" \
            >> .env

      - name: Run integration tests
        if: steps.integration.outputs.enabled == 'true'
        run: |
          ./venv/bin/python scripts/test_step03.py
          ./venv/bin/python scripts/test_step04.py
          ./venv/bin/python scripts/test_step05.py
          ./venv/bin/python scripts/test_step06.py
          ./venv/bin/python scripts/test_step07.py
          ./venv/bin/python scripts/test_step08.py
          ./venv/bin/python scripts/test_step09.py
